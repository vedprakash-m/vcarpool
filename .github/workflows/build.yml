name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'
  CACHE_VERSION: 'v1'
  AZURE_FUNCTIONAPP_NAME: vcarpool-api
  AZURE_STATICWEBAPP_NAME: vcarpool-web
  BACKEND_WORKING_DIR: ./backend
  FRONTEND_WORKING_DIR: ./frontend
  SHARED_WORKING_DIR: ./shared
  INFRASTRUCTURE_WORKING_DIR: ./infra

# Set default permissions for all jobs in the workflow
permissions:
  contents: read
  packages: write
  actions: read
  security-events: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.environment.outputs.environment }}
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Set environment
        id: environment
        run: |
          if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
      - name: Set ref
        id: ref
        run: echo "ref=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

  install-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci
          npm cache clean --force

  shared-build:
    needs: [setup, install-dependencies]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.SHARED_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-shared-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
          cd ${{ env.SHARED_WORKING_DIR }}
          npm ci --prefer-offline
          npm cache clean --force
      - name: Build shared library
        run: |
          echo "Building shared library..."
          npm run build
          echo "Build completed. Contents of dist:"
          ls -la dist/
        working-directory: ${{ env.SHARED_WORKING_DIR }}
      - name: Upload shared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}/dist
          retention-days: 1

  backend-build:
    needs: shared-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.BACKEND_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-backend-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
          cd ${{ env.BACKEND_WORKING_DIR }}
          npm ci --prefer-offline
          npm cache clean --force
      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}
      - name: Build backend
        run: npm run build
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      - name: Run backend tests
        run: npm test
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      - name: Run security audit
        run: npm audit --production
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
        continue-on-error: true  # Don't fail the build on audit failures, but still report them
      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: ${{ env.BACKEND_WORKING_DIR }}/dist
          retention-days: 1

  frontend-build:
    needs: shared-build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider
      CI: true
      NODE_ENV: production
      NEXT_TELEGRAM_DISABLED: 1
      NEXT_TELEMETRY_DISABLED: 1
      # Required environment variables
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:7071/api' }}
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for proper git history
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION || '20.x' }}
          cache: 'npm'
      
      - name: Cache node modules
        uses: actions/cache@v3
        id: cache-node-modules
        with:
          path: |
            ${{ env.FRONTEND_WORKING_DIR }}/node_modules
            ${{ env.FRONTEND_WORKING_DIR }}/.next/cache
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      
      - name: Install dependencies
        run: |
          echo "=== Installing Dependencies ==="
          npm ci --prefer-offline --no-audit --no-fund
          npx next telemetry disable
          
          echo "\n=== Installed Dependencies ==="
          npm ls next react react-dom
      
      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}
      
      - name: Verify Environment
        run: |
          echo "=== Verifying Environment ==="
          echo "Node: $(node -v)"
          echo "NPM: $(npm -v)"
          echo "Current directory: $(pwd)"
          
          # Verify required environment variables
          for var in NODE_ENV NODE_OPTIONS NEXT_PUBLIC_API_URL; do
            if [ -z "${!var}" ]; then
              echo "❌ Missing required environment variable: $var"
              exit 1
            else
              echo "✅ $var=${!var}"
            fi
          done
          
          echo "\n=== Environment Variables ==="
          env | sort
          
      - name: Build Frontend
        run: |
          echo "=== Starting Frontend Build ==="
          echo "Working directory: $(pwd)"
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Environment:"
          env | sort
          
          # Clean any previous builds
          echo "\n=== Cleaning previous builds ==="
          rm -rf .next
          
          # Run build with full output
          echo "\n=== Running Build ==="
          npm run build -- --debug 2>&1 | tee build.log || {
            echo "❌ Build failed with status $?"
            echo "=== Build Log (last 100 lines) ==="
            tail -n 100 build.log || echo "No build log found"
            exit 1
          }
          
          # Verify build output
          echo "\n=== Verifying Build Output ==="
          if [ ! -d ".next" ]; then
            echo "❌ Error: .next directory not found after build"
            echo "Current directory contents:"
            ls -la
            echo "\nBuild log (last 50 lines):"
            tail -n 50 build.log || echo "No build log found"
            exit 1
          fi
          
          echo "✅ Build completed successfully"
          echo "📂 .next directory contents:"
          du -sh .next
          echo "\nTop 10 largest files:"
          find .next -type f -exec du -h {} + | sort -rh | head -10
          
          # Verify build output is runnable
          echo "\n=== Verifying Build Output ==="
          if [ -f ".next/standalone/server.js" ]; then
            echo "Standalone server detected, checking startup..."
            node .next/standalone/server.js --version || {
              echo "❌ Failed to start standalone server"
              exit 1
            }
            pkill -f "node .next/standalone/server.js"
          elif [ -f ".next/server/pages-manifest.json" ]; then
            echo "Pages manifest found, verifying routes..."
            if ! grep -q '"/_app"' .next/server/pages-manifest.json; then
              echo "❌ Pages manifest is missing required routes"
              exit 1
            fi
          else
            echo "⚠️ Could not verify build output format"
          fi
          
          # Create build info
          echo "\n=== Creating Build Info ==="
          mkdir -p /tmp/build-info
          echo "Build completed at: $(date)" > /tmp/build-info/build-info.txt
          echo "Commit: ${{ github.sha }}" >> /tmp/build-info/build-info.txt
          echo "Ref: ${{ github.ref }}" >> /tmp/build-info/build-info.txt
          echo "Build ID: $(cat .next/BUILD_ID 2>/dev/null || echo 'unknown')" >> /tmp/build-info/build-info.txt
          
          # Create file manifest for verification
          find .next -type f > /tmp/build-info/artifact-manifest.txt
          
          echo "\n=== Build Info ==="
          cat /tmp/build-info/build-info.txt
      
      - name: Run Frontend Tests
        run: |
          echo "=== Running Tests ==="
          npm test -- --ci --coverage
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            ${{ env.FRONTEND_WORKING_DIR }}/.next
            /tmp/build-info
          retention-days: 7
          compression-level: 9
          if-no-files-found: error
          overwrite: true
      
      - name: Verify artifact upload
        run: |
          echo "=== Verifying Artifact Upload ==="
          echo "Build info:"
          cat /tmp/build-info/build-info.txt
          
          echo "\nArtifact size:"
          du -sh .next
          
          echo "\nTop 10 largest files:"
          find .next -type f -exec du -h {} + | sort -rh | head -10

  integration-tests:
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider
      CI: true
      NODE_ENV: test
      NEXT_TELEMETRY_DISABLED: 1
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION || '20.x' }}
          cache: 'npm'
      
      # Cache node modules and Playwright browsers
      - name: Cache dependencies
        uses: actions/cache@v3
        id: cache-deps
        with:
          path: |
            ${{ env.FRONTEND_WORKING_DIR }}/node_modules
            ${{ env.FRONTEND_WORKING_DIR }}/.next/cache
            ~/.cache/ms-playwright
            ~/.npm/_cacache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-
      
      - name: Install dependencies
        run: |
          echo "=== Installing Dependencies ==="
          # Clear npm cache to prevent corruption
          npm cache clean --force
          
          # Install with full output
          npm ci --prefer-offline --no-audit --no-fund --loglevel verbose
          npx next telemetry disable
          
          # Verify installation
          echo "\n=== Verifying Installation ==="
          npm ls next react react-dom --depth=0 || {
            echo "❌ Dependency verification failed"
            exit 1
          }
          
          # Install Playwright browsers
          echo "\n=== Installing Playwright ==="
          npx playwright install --with-deps
      
      # Download and verify frontend build artifacts
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.FRONTEND_WORKING_DIR }}
      
      - name: Verify build artifacts
        run: |
          echo "=== Verifying Build Artifacts ==="
          echo "Current directory: $(pwd)"
          
          # Check if .next directory exists
          if [ ! -d ".next" ]; then
            echo "❌ Error: .next directory not found in $(pwd)"
            echo "Directory contents:"
            ls -la
            exit 1
          fi
          
          echo "✅ .next directory found"
          echo "📂 .next contents:"
          ls -la .next/
          
          # Verify critical files
          for file in "BUILD_ID" "server/pages-manifest.json" "static/chunks/webpack.js"; do
            if [ -f ".next/$file" ]; then
              echo "✅ Found: .next/$file"
            else
              echo "❌ Missing required file: .next/$file"
              echo "Contents of .next/$(dirname "$file"):"
              ls -la ".next/$(dirname "$file")" || true
              exit 1
            fi
          done
      
      # Start backend server
      - name: Start backend server
        run: |
          echo "=== Starting Backend Server ==="
          cd ${{ env.BACKEND_WORKING_DIR }}
          
          echo "Installing dependencies..."
          npm ci --prefer-offline --no-audit --no-fund
          
          echo "Starting server..."
          npm install -g @azure/static-web-apps-cli
          swa start . \
            --api-location ./dist \
            --port 7071 \
            --no-open \
            & echo $! > backend_pid
          
          # Wait for server to be ready
          echo "Waiting for backend to be ready..."
          for i in {1..10}; do
            if curl -s http://localhost:7071/api/health >/dev/null; then
              echo "✅ Backend server is running"
              echo "BACKEND_URL=http://localhost:7071" >> $GITHUB_ENV
              exit 0
            fi
            echo "Waiting for backend... (attempt $i/10)"
            sleep 3
          done
          
          echo "❌ Backend server failed to start"
          echo "Last 20 lines of server log:"
          tail -n 20 swa-cli.log 2>/dev/null || echo "No server log found"
          exit 1
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      
      # Run tests
      - name: Run tests
        env:
          NODE_ENV: test
          NEXT_PUBLIC_API_URL: http://localhost:7071/api
          BACKEND_URL: http://localhost:7071
          PLAYWRIGHT_TEST_TIMEOUT: 60000
        run: |
          echo "=== Running Tests ==="
          echo "Node: $(node -v)"
          echo "NPM: $(npm -v)"
          echo "Environment:"
          env | sort
          
          # Run unit tests
          echo "\n=== Running Unit Tests ==="
          npm test -- --ci --coverage
          
          # Run E2E tests
          echo "\n=== Running E2E Tests ==="
          npm run test:e2e -- --retries=2
      
      # Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ${{ env.FRONTEND_WORKING_DIR }}/test-results
            ${{ env.FRONTEND_WORKING_DIR }}/playwright-report
            ${{ env.FRONTEND_WORKING_DIR }}/coverage
          retention-days: 7
      
      # Cleanup
      - name: Cleanup
        if: always()
        run: |
          echo "=== Cleaning Up ==="
          if [ -f "${{ env.BACKEND_WORKING_DIR }}/backend_pid" ]; then
            echo "Stopping backend server..."
            kill $(cat ${{ env.BACKEND_WORKING_DIR }}/backend_pid) 2>/dev/null || true
          fi
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
