name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'
  CACHE_VERSION: 'v1'
  NEXT_TELEMETRY_DISABLED: 1
  AZURE_FUNCTIONAPP_NAME: vcarpool-api
  AZURE_STATICWEBAPP_NAME: vcarpool-web
  BACKEND_WORKING_DIR: ./backend
  FRONTEND_WORKING_DIR: ./frontend
  SHARED_WORKING_DIR: ./shared
  INFRASTRUCTURE_WORKING_DIR: ./infra

# Set default permissions for all jobs in the workflow
permissions:
  contents: read
  packages: write
  actions: read
  security-events: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.environment.outputs.environment }}
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Set environment
        id: environment
        run: |
          if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
      - name: Set ref
        id: ref
        run: echo "ref=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

  install-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install root dependencies
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Install dependencies
        run: |
          npm ci
          npm cache clean --force

  shared-build:
    needs: install-dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Restore root dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ env.CACHE_VERSION }}
      - name: Build shared packages
        run: |
          echo "=== Building Shared Packages ==="
          npm run build --workspace=shared
          
          # Verify build output
          if [ ! -d "shared/dist" ]; then
            echo " Shared build failed: dist directory not found"
            exit 1
          fi
          echo " Shared build successful"
      - name: Build shared library
        run: |
          echo "Building shared library..."
          npm run build
          echo "Build completed. Contents of dist:"
          ls -la dist/
        working-directory: ${{ env.SHARED_WORKING_DIR }}
      - name: Upload shared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}/dist
          retention-days: 1

  backend-build:
    needs: [shared-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: shared/dist
      - name: Install dependencies
        working-directory: ./backend
        run: |
          echo "=== Installing Backend Dependencies ==="
          npm ci --prefer-offline --no-audit --no-fund
      - name: Build backend
        run: |
          echo "=== Building Backend ==="
          cd backend
          npm run build
          
          # Verify build output
          if [ ! -d "dist" ]; then
            echo " Backend build failed: dist directory not found"
            exit 1
          fi
          echo " Backend build successful"
      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/dist
          retention-days: 7
          compression-level: 9
      - name: Run backend tests
        run: npm test
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      - name: Run security audit
        run: npm audit --production
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
        continue-on-error: true  # Don't fail the build on audit failures, but still report them
      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: ${{ env.BACKEND_WORKING_DIR }}/dist
          retention-days: 1

  frontend-build:
    needs: [backend-build]
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider
      CI: true
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: shared/dist
      - name: Install dependencies
        working-directory: ./frontend
        run: |
          echo "=== Installing Frontend Dependencies ==="
          npm ci --prefer-offline --no-audit --no-fund
      - name: Build frontend
        run: |
          echo "=== Building Frontend ==="
          cd frontend
          
          # Clear any existing .next directory
          if [ -d ".next" ]; then
            echo "Removing existing .next directory..."
            rm -rf .next
          fi
          
          # Run the build
          npm run build
          
          # Verify build output
          if [ ! -d ".next" ]; then
            echo " Frontend build failed: .next directory not found"
            exit 1
          fi
          
          echo ".next directory contents:"
          ls -la .next/
      
      - name: Run Frontend Tests
        run: npm test
      
      - name: Run security audit
        run: npm audit --production
        continue-on-error: true
      
      - name: Create build info
        run: |
          mkdir -p /tmp/build-info
          echo "Build completed at: $(date)" > /tmp/build-info/build-info.txt
          echo "Commit: ${{ github.sha }}" >> /tmp/build-info/build-info.txt
          echo "Ref: ${{ github.ref }}" >> /tmp/build-info/build-info.txt
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            ${{ env.FRONTEND_WORKING_DIR }}/.next
            /tmp/build-info
      - name: Run Build Script
        run: |
          echo "=== Starting Build Script ==="
          chmod +x ./scripts/ci-build.mjs
          node ./scripts/ci-build.mjs
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: true
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:7071/api' }}
      
      # Upload build artifacts
      - name: Upload Frontend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            ./frontend/.next
            ./frontend/build-info
          retention-days: 7
          if-no-files-found: error
          compression-level: 9
      
      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: ./backend/dist
          retention-days: 7
          if-no-files-found: error
          compression-level: 9

  integration-tests:
    needs: [frontend-build]
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider
      CI: true
      NODE_ENV: test
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/dist
      - name: Install test dependencies
        run: |
          echo "=== Installing Test Dependencies ==="
          npm ci --prefer-offline --no-audit --no-fund
          cd frontend
          npm ci --prefer-offline --no-audit --no-fund
          npx playwright install --with-deps
      - name: Start backend server
        id: backend
        run: |
          echo "=== Starting Backend Server ==="
          cd backend
          npm install -g @azure/static-web-apps-cli
          swa start . \
            --api-location ./dist \
            --port 7071 \
            --no-open \
            & echo $! > backend_pid
          
          # Wait for server to be ready
          echo "Waiting for backend to be ready..."
          for i in {1..10}; do
            if curl -s http://localhost:7071/api/health >/dev/null; then
              echo "✅ Backend server is running"
              echo "BACKEND_URL=http://localhost:7071" >> $GITHUB_ENV
              exit 0
            fi
            echo "Waiting for backend... (attempt $i/10)"
            sleep 3
          done
          
          echo "❌ Backend server failed to start"
          echo "Last 20 lines of server log:"
          tail -n 20 swa-cli.log 2>/dev/null || echo "No server log found"
          exit 1
      - name: Run tests
        env:
          NODE_ENV: test
          NEXT_PUBLIC_API_URL: http://localhost:7071/api
          BACKEND_URL: http://localhost:7071
          PLAYWRIGHT_TEST_TIMEOUT: 60000
        run: |
          echo "=== Running Tests ==="
          cd frontend
          
          # Run unit tests
          echo "\n=== Running Unit Tests ==="
          npm test -- --ci --coverage
          
          # Run E2E tests
          echo "\n=== Running E2E Tests ==="
          npm run test:e2e -- --retries=2
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            frontend/test-results
            frontend/playwright-report
            frontend/coverage
          retention-days: 7
      - name: Stop backend server
        if: always()
        run: |
          echo "=== Cleaning Up ==="
          if [ -f "backend/backend_pid" ]; then
            echo "Stopping backend server..."
            kill $(cat backend/backend_pid) 2>/dev/null || true
          fi
