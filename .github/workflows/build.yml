name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'
  CACHE_VERSION: 'v1'
  AZURE_FUNCTIONAPP_NAME: vcarpool-api
  AZURE_STATICWEBAPP_NAME: vcarpool-web
  BACKEND_WORKING_DIR: ./backend
  FRONTEND_WORKING_DIR: ./frontend
  SHARED_WORKING_DIR: ./shared
  INFRASTRUCTURE_WORKING_DIR: ./infra

# Set default permissions for all jobs in the workflow
permissions:
  contents: read
  packages: write
  actions: read
  security-events: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.environment.outputs.environment }}
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Set environment
        id: environment
        run: |
          if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
      - name: Set ref
        id: ref
        run: echo "ref=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

  install-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci
          npm cache clean --force

  shared-build:
    needs: [setup, install-dependencies]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.SHARED_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-shared-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
          cd ${{ env.SHARED_WORKING_DIR }}
          npm ci --prefer-offline
          npm cache clean --force
      - name: Build shared library
        run: |
          echo "Building shared library..."
          npm run build
          echo "Build completed. Contents of dist:"
          ls -la dist/
        working-directory: ${{ env.SHARED_WORKING_DIR }}
      - name: Upload shared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}/dist
          retention-days: 1

  backend-build:
    needs: shared-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.BACKEND_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-backend-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
          cd ${{ env.BACKEND_WORKING_DIR }}
          npm ci --prefer-offline
          npm cache clean --force
      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}
      - name: Build backend
        run: npm run build
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      - name: Run backend tests
        run: npm test
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      - name: Run security audit
        run: npm audit --production
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
        continue-on-error: true  # Don't fail the build on audit failures, but still report them
      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: ${{ env.BACKEND_WORKING_DIR }}/dist
          retention-days: 1

  frontend-build:
    needs: shared-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.FRONTEND_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-frontend-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
          cd ${{ env.FRONTEND_WORKING_DIR }}
          npm ci
          npm cache clean --force
      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}
      - name: Build Frontend
        run: |
          echo "Setting up OpenSSL legacy provider..."
          export NODE_OPTIONS=--openssl-legacy-provider
          echo "NODE_OPTIONS set to: $NODE_OPTIONS"
          echo "Running npm install..."
          npm install
          echo "Running npm run build..."
          npm run build
          echo "Build completed. Contents of .next:"
          ls -la .next/
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Run Frontend Tests
        run: |
          echo "Setting up OpenSSL legacy provider for tests..."
          echo "NODE_OPTIONS set to: $NODE_OPTIONS"
          echo "Running tests..."
          npm test
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: true
      - name: Run security audit
        run: npm audit --production
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        continue-on-error: true  # Don't fail the build on audit failures, but still report them
      - name: Prepare frontend artifacts
        id: prepare-artifacts
        run: |
          # Create a clean directory for the frontend artifacts
          mkdir -p /tmp/frontend-dist/.next
          
          # Copy the built files to the clean directory
          echo "Copying .next directory contents..."
          cp -r .next/* /tmp/frontend-dist/.next/
          
          # Verify the files were copied
          echo "Verifying copied files..."
          if [ ! -d "/tmp/frontend-dist/.next" ]; then
            echo "Error: .next directory was not created"
            exit 1
          fi
          
          # List the contents for debugging
          echo "Contents of /tmp/frontend-dist/.next:"
          ls -la /tmp/frontend-dist/.next
          
          # Verify we have the required files
          if [ ! -f "/tmp/frontend-dist/.next/BUILD_ID" ]; then
            echo "Error: BUILD_ID file is missing from .next directory"
            exit 1
          fi
          
          echo "Artifacts prepared successfully"
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
      
      - name: Upload frontend artifacts
        id: upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            /tmp/frontend-dist/.next
            /tmp/frontend-dist/.next/static
          if-no-files-found: error
          retention-days: 1

  integration-tests:
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Download artifacts first
      - name: Download backend artifacts
        id: download-backend
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: ${{ env.BACKEND_WORKING_DIR }}
      
      - name: Download frontend artifacts
        id: download-frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: /tmp/artifacts/frontend-dist
          
      # Verify downloaded artifacts
      - name: Verify downloaded artifacts
        run: |
          echo "=== Backend artifacts ==="
          if [ ! -d "${{ env.BACKEND_WORKING_DIR }}/dist" ]; then
            echo "Error: Backend dist directory not found"
            ls -la "${{ env.BACKEND_WORKING_DIR }}"
            exit 1
          fi
          
          echo "\n=== Frontend artifacts ==="
          if [ ! -d "/tmp/artifacts/frontend-dist" ]; then
            echo "Error: Frontend artifacts directory not found"
            ls -la /tmp/artifacts
            exit 1
          fi
          
          echo "\nFrontend artifact contents:"
          find /tmp/artifacts/frontend-dist -type f | sort
          
          echo "\nVerifying required files..."
          if [ ! -f "/tmp/artifacts/frontend-dist/.next/BUILD_ID" ]; then
            echo "Error: BUILD_ID file is missing from frontend artifacts"
            exit 1
          fi
          
          echo "\nAll artifacts verified successfully"
          
      # Setup Node.js and dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.FRONTEND_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-integration-${{ hashFiles('**/package-lock.json') }}
          
      - name: Install dependencies
        run: |
          cd ${{ env.FRONTEND_WORKING_DIR }}
          npm ci --prefer-offline
          npm cache clean --force
          
      # Restore the frontend build from downloaded artifacts
      - name: Restore frontend build
        run: |
          echo "Restoring frontend build..."
          
          # Ensure the target directory exists
          mkdir -p ${{ env.FRONTEND_WORKING_DIR }}/.next
          
          # Copy the artifacts to the correct location
          echo "Copying artifacts from /tmp/artifacts/frontend-dist to ${{ env.FRONTEND_WORKING_DIR }}"
          
          # Copy all files from the artifact to the .next directory
          if [ -d "/tmp/artifacts/frontend-dist" ]; then
            cp -r /tmp/artifacts/frontend-dist/.next/* ${{ env.FRONTEND_WORKING_DIR }}/.next/
            
            # Verify the copy was successful
            if [ $? -ne 0 ]; then
              echo "Error: Failed to copy frontend artifacts"
              exit 1
            fi
            
            echo "Verifying restored files..."
            if [ ! -f "${{ env.FRONTEND_WORKING_DIR }}/.next/BUILD_ID" ]; then
              echo "Error: BUILD_ID file is missing after restore"
              exit 1
            fi
            
            echo "Frontend build restored successfully"
            echo "Contents of ${{ env.FRONTEND_WORKING_DIR }}/.next:"
            ls -la ${{ env.FRONTEND_WORKING_DIR }}/.next
          else
            echo "Error: Frontend artifacts not found in /tmp/artifacts/frontend-dist"
            exit 1
          fi
          
      # Run the tests
      - name: Run Integration Tests
        run: |
          echo "Setting up OpenSSL legacy provider for tests..."
          echo "NODE_OPTIONS set to: $NODE_OPTIONS"
          echo "Running integration tests..."
          npm test
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: true
          NODE_ENV: test
      - name: Start backend server
        run: |
          npm install -g @azure/static-web-apps-cli
          swa start ${{ env.BACKEND_WORKING_DIR }} --api-location ${{ env.BACKEND_WORKING_DIR }}/dist --port 7071 & echo $! > backend_pid
          trap "kill $(cat backend_pid)" EXIT
          echo "BACKEND_URL=http://localhost:7071" >> $GITHUB_ENV
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      - name: Run integration tests
        env:
          BACKEND_URL: http://localhost:7071
        run: |
          echo "Running integration tests against $BACKEND_URL"
          npm run test:e2e
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
