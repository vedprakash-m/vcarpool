name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'
  CACHE_VERSION: 'v1'
  AZURE_FUNCTIONAPP_NAME: vcarpool-api
  AZURE_STATICWEBAPP_NAME: vcarpool-web
  BACKEND_WORKING_DIR: ./backend
  FRONTEND_WORKING_DIR: ./frontend
  SHARED_WORKING_DIR: ./shared
  INFRASTRUCTURE_WORKING_DIR: ./infra

# Set default permissions for all jobs in the workflow
permissions:
  contents: read
  packages: write
  actions: read
  security-events: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.environment.outputs.environment }}
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Set environment
        id: environment
        run: |
          if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
      - name: Set ref
        id: ref
        run: echo "ref=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

  install-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci
          npm cache clean --force

  shared-build:
    needs: [setup, install-dependencies]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.SHARED_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-shared-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
          cd ${{ env.SHARED_WORKING_DIR }}
          npm ci --prefer-offline
          npm cache clean --force
      - name: Build shared library
        run: |
          echo "Building shared library..."
          npm run build
          echo "Build completed. Contents of dist:"
          ls -la dist/
        working-directory: ${{ env.SHARED_WORKING_DIR }}
      - name: Upload shared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}/dist
          retention-days: 1

  backend-build:
    needs: shared-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.BACKEND_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-backend-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
          cd ${{ env.BACKEND_WORKING_DIR }}
          npm ci --prefer-offline
          npm cache clean --force
      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}
      - name: Build backend
        run: npm run build
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      - name: Run backend tests
        run: npm test
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      - name: Run security audit
        run: npm audit --production
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
        continue-on-error: true  # Don't fail the build on audit failures, but still report them
      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: ${{ env.BACKEND_WORKING_DIR }}/dist
          retention-days: 1

  frontend-build:
    needs: shared-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.FRONTEND_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-frontend-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
          cd ${{ env.FRONTEND_WORKING_DIR }}
          npm ci
          npm cache clean --force
      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}
      - name: Build Frontend
        run: |
          echo "Setting up OpenSSL legacy provider..."
          export NODE_OPTIONS=--openssl-legacy-provider
          echo "NODE_OPTIONS set to: $NODE_OPTIONS"
          echo "Running npm install..."
          npm install
          echo "Running npm run build..."
          npm run build
          echo "Build completed. Contents of .next:"
          ls -la .next/
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Run Frontend Tests
        run: |
          echo "Setting up OpenSSL legacy provider for tests..."
          echo "NODE_OPTIONS set to: $NODE_OPTIONS"
          echo "Running tests..."
          npm test
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: true
      - name: Run security audit
        run: npm audit --production
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        continue-on-error: true  # Don't fail the build on audit failures, but still report them
      - name: Prepare frontend artifacts
        id: prepare-artifacts
        run: |
          # Create a clean directory for the frontend artifacts
          ARTIFACT_DIR="/tmp/frontend-dist"
          echo "Preparing artifacts in $ARTIFACT_DIR"
          
          # Ensure the directory exists and is empty
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"
          
          # Copy the .next directory
          echo "Copying .next directory..."
          if [ ! -d ".next" ]; then
            echo "Error: .next directory not found in working directory"
            ls -la .
            exit 1
          fi
          
          # Copy the entire .next directory
          cp -r .next "$ARTIFACT_DIR/"
          
          # Verify the copy was successful
          if [ $? -ne 0 ]; then
            echo "Error: Failed to copy .next directory"
            exit 1
          fi
          
          # List the contents for debugging
          echo "Contents of $ARTIFACT_DIR:"
          ls -la "$ARTIFACT_DIR"
          
          echo "Contents of $ARTIFACT_DIR/.next:"
          ls -la "$ARTIFACT_DIR/.next"
          
          # Verify we have the required files
          if [ ! -f "$ARTIFACT_DIR/.next/BUILD_ID" ]; then
            echo "Error: BUILD_ID file is missing from .next directory"
            find "$ARTIFACT_DIR" -type f | sort
            exit 1
          fi
          
          echo "Artifacts prepared successfully in $ARTIFACT_DIR"
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
      
      - name: Verify artifact directory before upload
        id: verify-artifacts
        run: |
          echo "Verifying artifact directory structure..."
          if [ ! -d "/tmp/frontend-dist" ]; then
            echo "Error: /tmp/frontend-dist directory does not exist"
            ls -la /tmp/
            exit 1
          fi
          
          echo "Contents of /tmp/frontend-dist:"
          ls -la /tmp/frontend-dist
          
          if [ ! -d "/tmp/frontend-dist/.next" ]; then
            echo "Error: .next directory not found in /tmp/frontend-dist"
            exit 1
          fi
          
          echo "Artifact directory structure is valid"
      
      - name: Upload frontend artifacts
        id: upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: /tmp/frontend-dist
          if-no-files-found: error
          retention-days: 1

  integration-tests:
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Create directories for artifacts
      - name: Create artifact directories
        run: |
          mkdir -p /tmp/artifacts/frontend-dist
          mkdir -p "${{ env.BACKEND_WORKING_DIR }}"
      
      # Download artifacts first
      - name: Download backend artifacts
        id: download-backend
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: ${{ env.BACKEND_WORKING_DIR }}
      
      - name: Download frontend artifacts
        id: download-frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: /tmp/artifacts/frontend-dist
          
      # Verify downloaded artifacts
      - name: Verify downloaded artifacts
        run: |
          echo "=== Current Directory ==="
          pwd
          ls -la
          
          echo "\n=== Backend artifacts ==="
          if [ ! -d "${{ env.BACKEND_WORKING_DIR }}/dist" ]; then
            echo "Error: Backend dist directory not found"
            echo "Contents of ${{ env.BACKEND_WORKING_DIR }}:"
            ls -la "${{ env.BACKEND_WORKING_DIR }}"
            exit 1
          fi
          
          echo "\n=== Frontend artifacts ==="
          if [ ! -d "/tmp/artifacts/frontend-dist" ]; then
            echo "Error: Frontend artifacts directory not found"
            echo "Contents of /tmp/artifacts:"
            ls -la /tmp/artifacts
            exit 1
          fi
          
          echo "\nFrontend artifact directory structure:"
          find /tmp/artifacts/frontend-dist -type d | sort
          
          echo "\nFrontend artifact files:"
          find /tmp/artifacts/frontend-dist -type f | sort
          
          echo "\nVerifying required files..."
          if [ ! -d "/tmp/artifacts/frontend-dist/.next" ]; then
            echo "Error: .next directory is missing from frontend artifacts"
            echo "Contents of frontend-dist:"
            ls -la /tmp/artifacts/frontend-dist
            exit 1
          fi
          
          if [ ! -f "/tmp/artifacts/frontend-dist/.next/BUILD_ID" ]; then
            echo "Error: BUILD_ID file is missing from frontend artifacts"
            echo "Contents of .next directory:"
            ls -la /tmp/artifacts/frontend-dist/.next
            exit 1
          fi
          
          echo "\nAll artifacts verified successfully"
          
      # Setup Node.js and dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.FRONTEND_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-integration-${{ hashFiles('**/package-lock.json') }}
          
      - name: Install dependencies
        run: |
          cd ${{ env.FRONTEND_WORKING_DIR }}
          npm ci --prefer-offline
          npm cache clean --force
          
      # Restore the frontend build from downloaded artifacts
      - name: Restore frontend build
        run: |
          echo "=== Restoring frontend build ==="
          
          # Source and target directories
          SRC_DIR="/tmp/artifacts/frontend-dist"
          TARGET_DIR="${{ env.FRONTEND_WORKING_DIR }}/.next"
          
          echo "Source directory: $SRC_DIR"
          echo "Target directory: $TARGET_DIR"
          
          # Verify source directory exists
          if [ ! -d "$SRC_DIR" ]; then
            echo "Error: Source directory $SRC_DIR does not exist"
            exit 1
          fi
          
          # Ensure target directory exists
          echo "Creating target directory: $TARGET_DIR"
          mkdir -p "$TARGET_DIR"
          
          # Check if .next exists in source
          if [ ! -d "$SRC_DIR/.next" ]; then
            echo "Error: .next directory not found in $SRC_DIR"
            echo "Contents of $SRC_DIR:"
            ls -la "$SRC_DIR"
            exit 1
          fi
          
          # Copy the .next directory
          echo "Copying .next directory from $SRC_DIR/.next to $TARGET_DIR"
          cp -r "$SRC_DIR/.next/"* "$TARGET_DIR/"
          
          # Verify the copy was successful
          if [ $? -ne 0 ]; then
            echo "Error: Failed to copy frontend artifacts"
            exit 1
          fi
          
          # Verify the BUILD_ID file exists
          echo "Verifying restored files..."
          if [ ! -f "$TARGET_DIR/BUILD_ID" ]; then
            echo "Error: BUILD_ID file is missing after restore"
            echo "Contents of $TARGET_DIR:"
            ls -la "$TARGET_DIR"
            exit 1
          fi
          
          echo "Frontend build restored successfully"
          echo "Contents of $TARGET_DIR:"
          ls -la "$TARGET_DIR"
          
          echo "Verifying next build..."
          if [ -f "${{ env.FRONTEND_WORKING_DIR }}/node_modules/.bin/next" ]; then
            "${{ env.FRONTEND_WORKING_DIR }}/node_modules/.bin/next" info
          else
            echo "Next.js binary not found, skipping verification"
          fi
          
      # Run the tests
      - name: Run Integration Tests
        run: |
          echo "Setting up OpenSSL legacy provider for tests..."
          echo "NODE_OPTIONS set to: $NODE_OPTIONS"
          echo "Running integration tests..."
          npm test
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: true
          NODE_ENV: test
      - name: Start backend server
        run: |
          npm install -g @azure/static-web-apps-cli
          swa start ${{ env.BACKEND_WORKING_DIR }} --api-location ${{ env.BACKEND_WORKING_DIR }}/dist --port 7071 & echo $! > backend_pid
          trap "kill $(cat backend_pid)" EXIT
          echo "BACKEND_URL=http://localhost:7071" >> $GITHUB_ENV
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      - name: Run integration tests
        env:
          BACKEND_URL: http://localhost:7071
        run: |
          echo "Running integration tests against $BACKEND_URL"
          npm run test:e2e
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
