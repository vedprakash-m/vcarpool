name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'
  CACHE_VERSION: 'v1'
  AZURE_FUNCTIONAPP_NAME: vcarpool-api
  AZURE_STATICWEBAPP_NAME: vcarpool-web
  BACKEND_WORKING_DIR: ./backend
  FRONTEND_WORKING_DIR: ./frontend
  SHARED_WORKING_DIR: ./shared
  INFRASTRUCTURE_WORKING_DIR: ./infra

# Set default permissions for all jobs in the workflow
permissions:
  contents: read
  packages: write
  actions: read
  security-events: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.environment.outputs.environment }}
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Set environment
        id: environment
        run: |
          if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
      - name: Set ref
        id: ref
        run: echo "ref=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

  install-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci
          npm cache clean --force

  shared-build:
    needs: [setup, install-dependencies]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.SHARED_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-shared-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
          cd ${{ env.SHARED_WORKING_DIR }}
          npm ci --prefer-offline
          npm cache clean --force
      - name: Build shared library
        run: |
          echo "Building shared library..."
          npm run build
          echo "Build completed. Contents of dist:"
          ls -la dist/
        working-directory: ${{ env.SHARED_WORKING_DIR }}
      - name: Upload shared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}/dist
          retention-days: 1

  backend-build:
    needs: shared-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: ${{ env.BACKEND_WORKING_DIR }}/node_modules
          key: ${{ runner.os }}-node-modules-backend-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
          cd ${{ env.BACKEND_WORKING_DIR }}
          npm ci --prefer-offline
          npm cache clean --force
      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}
      - name: Build backend
        run: npm run build
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      - name: Run backend tests
        run: npm test
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
      - name: Run security audit
        run: npm audit --production
        working-directory: ${{ env.BACKEND_WORKING_DIR }}
        continue-on-error: true  # Don't fail the build on audit failures, but still report them
      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: ${{ env.BACKEND_WORKING_DIR }}/dist
          retention-days: 1

  frontend-build:
    needs: shared-build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Cache node modules
        uses: actions/cache@v3
        id: cache-node-modules
        with:
          path: |
            ${{ env.FRONTEND_WORKING_DIR }}/node_modules
            ${{ env.FRONTEND_WORKING_DIR }}/.next/cache
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      
      - name: Install dependencies
        run: |
          npm ci --prefer-offline
          npx next telemetry disable
      
      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: ${{ env.SHARED_WORKING_DIR }}
      
      - name: Build Frontend
        run: |
          echo "=== Starting Frontend Build ==="
          echo "Working directory: $(pwd)"
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          
          # Run build with debug output
          echo "Running build..."
          npm run build
          
          # Verify build output
          echo "Build completed. Directory contents:"
          ls -la
          
          if [ ! -d ".next" ]; then
            echo "Error: .next directory not found after build"
            exit 1
          fi
          
          echo ".next directory contents:"
          ls -la .next/
      
      - name: Run Frontend Tests
        run: npm test
      
      - name: Run security audit
        run: npm audit --production
        continue-on-error: true
      
      - name: Create build info
        run: |
          mkdir -p /tmp/build-info
          echo "Build completed at: $(date)" > /tmp/build-info/build-info.txt
          echo "Commit: ${{ github.sha }}" >> /tmp/build-info/build-info.txt
          echo "Ref: ${{ github.ref }}" >> /tmp/build-info/build-info.txt
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            ${{ env.FRONTEND_WORKING_DIR }}/.next
            /tmp/build-info
      - name: Run Build Script
        run: |
          echo "=== Starting Build Script ==="
          chmod +x ./scripts/ci-build.mjs
          node ./scripts/ci-build.mjs
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: true
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:7071/api' }}
      
      # Upload build artifacts
      - name: Upload Frontend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            ./frontend/.next
            ./frontend/build-info
          retention-days: 7
          if-no-files-found: error
          compression-level: 9
      
      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: ./backend/dist
          retention-days: 7
          if-no-files-found: error
          compression-level: 9

  integration-tests:
    needs: [frontend-build]
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider
      CI: true
      NODE_ENV: test
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION || '20.x' }}
          cache: 'npm'
      
      # Download build artifacts
      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./frontend
      
      - name: Download Backend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: ./backend/dist
      
      # Install root dependencies
      - name: Install Dependencies
        run: |
          echo "=== Installing Dependencies ==="
          npm ci --prefer-offline --no-audit --no-fund
          cd frontend
          npm ci --prefer-offline --no-audit --no-fund
          npx playwright install --with-deps
      
      # Start backend server
      - name: Start Backend Server
        run: |
          echo "=== Starting Backend Server ==="
          cd backend
          npm install -g @azure/static-web-apps-cli
          swa start . \
            --api-location ./dist \
            --port 7071 \
            --no-open \
            & echo $! > backend_pid
          
          # Wait for server to be ready
          echo "Waiting for backend to be ready..."
          for i in {1..10}; do
            if curl -s http://localhost:7071/api/health >/dev/null; then
              echo "✅ Backend server is running"
              echo "BACKEND_URL=http://localhost:7071" >> $GITHUB_ENV
              exit 0
            fi
            echo "Waiting for backend... (attempt $i/10)"
            sleep 3
          done
          
          echo "❌ Backend server failed to start"
          echo "Last 20 lines of server log:"
          tail -n 20 swa-cli.log 2>/dev/null || echo "No server log found"
          exit 1
      
      # Run tests
      - name: Run Tests
        env:
          NODE_ENV: test
          NEXT_PUBLIC_API_URL: http://localhost:7071/api
          BACKEND_URL: http://localhost:7071
          PLAYWRIGHT_TEST_TIMEOUT: 60000
        run: |
          echo "=== Running Tests ==="
          cd frontend
          
          # Run unit tests
          echo "\n=== Running Unit Tests ==="
          npm test -- --ci --coverage
          
          # Run E2E tests
          echo "\n=== Running E2E Tests ==="
          npm run test:e2e -- --retries=2
      
      # Upload test results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ./frontend/test-results
            ./frontend/playwright-report
            ./frontend/coverage
          retention-days: 7
      
      # Cleanup
      - name: Cleanup
        if: always()
        run: |
          echo "=== Cleaning Up ==="
          if [ -f "backend/backend_pid" ]; then
            echo "Stopping backend server..."
            kill $(cat backend/backend_pid) 2>/dev/null || true
          fi
